
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cavaquinho</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #05070a;
      color: #eaeef5;
      font-family: Arial, sans-serif;
    }

    .cabecera, .zona {
      margin: 12px;
      padding: 12px;
      border: 1px solid #2b3440;
      border-radius: 10px;
      background: #10151c;
    }

    .cabecera {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .campo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: #9fa8b5;
      white-space: nowrap;
    }

    input, textarea {
      background: #05070a;
      color: white;
      border: 1px solid #394452;
      border-radius: 6px;
      padding: 8px;
      font-size: 16px;
    }

    #tema { width: 320px; }
    #autor { width: 240px; }
    #tonalidad { width: 80px; }

    .fila {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cuadro {
      width: 160px;
      min-height: 90px;
      border: 1px solid #394452;
      border-radius: 10px;
      background: #111821;
      padding: 8px;
      display: flex;
      flex-direction: column;
    }

    .posicion {
      font-size: 13px;
      color: #7f8b99;
      margin-bottom: 8px;
    }

    .contenido {
      flex: 1;
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      font-size: 18px;
      width: 100%;
    }

    button {
      background: #1c2633;
      color: white;
      border: 1px solid #3c4858;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .boton-derecha {
      align-self: center;
      min-width: 38px;
    }

    .bloque-json {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2b3440;
      display: flex;
      gap: 10px;
    }
  </style>
</head>

<body>

  <div class="cabecera">
    <div class="campo">
      <label>Tema musical</label>
      <input id="tema" type="text">
    </div>

    <div class="campo">
      <label>Autor</label>
      <input id="autor" type="text">
    </div>

    <div class="campo">
      <label>Tonalidad</label>
      <input id="tonalidad" type="text">
    </div>
  </div>

  <div class="zona">
    <div id="tablero"></div>

    <button onclick="crearFila()">+ crear fila debajo</button>

    <div class="bloque-json">
      <button onclick="guardarJSON()">Guardar JSON</button>
      <button onclick="document.getElementById('cargarArchivo').click()">Cargar JSON</button>
      <button onclick="imprimir()">Imprimir</button>

      <input id="cargarArchivo" type="file" accept=".json" style="display:none" onchange="cargarJSON(event)">
    </div>
  </div>

  <script>
    const cancion = {
      tema: "",
      autor: "",
      tonalidad: "",
      cuadros: [[{ contenido: "" }]]
    };

    const tablero = document.getElementById("tablero");

    function pintarTablero() {
      tablero.innerHTML = "";

      cancion.cuadros.forEach((fila, i) => {
        const filaDiv = document.createElement("div");
        filaDiv.className = "fila";

        fila.forEach((cuadro, j) => {
          const cuadroDiv = document.createElement("div");
          cuadroDiv.className = "cuadro";

          const posicion = document.createElement("div");
          posicion.className = "posicion";
          posicion.textContent = `${i + 1},${j + 1}`;

          const contenido = document.createElement("textarea");
          contenido.className = "contenido";
          contenido.value = cuadro.contenido;
          contenido.placeholder = "Acorde";
          contenido.oninput = () => cuadro.contenido = contenido.value;

          cuadroDiv.appendChild(posicion);
          cuadroDiv.appendChild(contenido);
          filaDiv.appendChild(cuadroDiv);
        });

        const boton = document.createElement("button");
        boton.className = "boton-derecha";
        boton.textContent = "+";
        boton.onclick = () => crearCuadroDerecha(i);

        filaDiv.appendChild(boton);
        tablero.appendChild(filaDiv);
      });
    }

    function crearCuadroDerecha(i) {
      cancion.cuadros[i].push({ contenido: "" });
      pintarTablero();
    }

    function crearFila() {
      cancion.cuadros.push([{ contenido: "" }]);
      pintarTablero();
    }

    function actualizarCabeceraEnObjeto() {
      cancion.tema = document.getElementById("tema").value;
      cancion.autor = document.getElementById("autor").value;
      cancion.tonalidad = document.getElementById("tonalidad").value;
    }

    function cargarCabeceraDesdeObjeto() {
      document.getElementById("tema").value = cancion.tema || "";
      document.getElementById("autor").value = cancion.autor || "";
      document.getElementById("tonalidad").value = cancion.tonalidad || "";
    }

    function guardarJSON() {
      actualizarCabeceraEnObjeto();

      const datos = JSON.stringify(cancion, null, 2);
      const blob = new Blob([datos], { type: "application/json" });
      const enlace = document.createElement("a");

      const nombre = (cancion.tema || "cancion")
        .toLowerCase()
        .replaceAll(" ", "_")
        .replace(/[^\w\-]/g, "");

      enlace.href = URL.createObjectURL(blob);
      enlace.download = nombre + ".json";
      enlace.click();
      URL.revokeObjectURL(enlace.href);
    }

    function cargarJSON(event) {
      const archivo = event.target.files[0];
      if (!archivo) return;

      const lector = new FileReader();

      lector.onload = function(e) {
        const datos = JSON.parse(e.target.result);

        cancion.tema = datos.tema || "";
        cancion.autor = datos.autor || "";
        cancion.tonalidad = datos.tonalidad || "";
        cancion.cuadros = datos.cuadros || [[{ contenido: "" }]];

        cargarCabeceraDesdeObjeto();
        pintarTablero();
      };

      lector.readAsText(archivo);
    }

    function imprimir() {
      actualizarCabeceraEnObjeto();
      window.print();
    }

    pintarTablero();
  </script>

</body>
</html>
