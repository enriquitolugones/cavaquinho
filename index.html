
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cavaquinho</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #05070a;
      color: #eaeef5;
      font-family: Arial, sans-serif;
    }

    .cabecera, .zona {
      margin: 12px;
      padding: 12px;
      border: 1px solid #2b3440;
      border-radius: 10px;
      background: #10151c;
    }

    .cabecera {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .campo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: #9fa8b5;
      white-space: nowrap;
    }

    input, textarea {
      background: #05070a;
      color: white;
      border: 1px solid #394452;
      border-radius: 6px;
      padding: 8px;
      font-size: 16px;
    }

    #tema { width: 320px; }
    #autor { width: 240px; }
    #tonalidad { width: 80px; }

    .fila {
      margin-bottom: 18px;
    }

    .linea-acordes {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .cuadro {
      width: 160px;
      min-height: 95px;
      border: 1px solid #394452;
      border-radius: 10px;
      background: #111821;
      padding: 6px;
      display: flex;
      flex-direction: column;
    }

    .barra-cuadro {
      display: grid;
      grid-template-columns: 34px 1fr 28px;
      gap: 4px;
      align-items: center;
      margin-bottom: 6px;
    }

    .compas {
      width: 34px;
      height: 30px;
      font-size: 13px;
      color: #eaeef5;
      background: #05070a;
      border: 1px solid #394452;
      border-radius: 6px;
      padding: 2px;
      text-align: center;
    }

    .selector-tipo {
      display: flex;
      justify-content: center;
      gap: 3px;
    }

    .tipo {
      width: 30px;
      height: 30px;
      padding: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tipo.activo {
      border-color: #2f81f7;
      background: #12345a;
    }

    .papelera {
      width: 28px;
      height: 30px;
      padding: 0;
      font-size: 15px;
    }

    .cavaco-icono {
      font-size: 18px;
      line-height: 1;
      letter-spacing: -1px;
    }

    .acorde {
      flex: 1;
      background: transparent;
      color: white;
      border: none;
      resize: none;
      outline: none;
      font-size: 22px;
      text-align: center;
    }

    .letra {
      margin-top: 8px;
      width: var(--ancho-letra);
      min-height: 25px;
      resize: vertical;
      font-size: 18px;
      line-height: 1.4;
    }

    button {
      background: #1c2633;
      color: white;
      border: 1px solid #3c4858;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #263445;
    }

    .boton-derecha {
      align-self: center;
      min-width: 38px;
      height: 38px;
    }

    .bloque-json {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #2b3440;
      display: flex;
      gap: 10px;
    }
  </style>
</head>

<body>

  <div class="cabecera">
    <div class="campo">
      <label>Tema musical</label>
      <input id="tema" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <div class="campo">
      <label>Autor</label>
      <input id="autor" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <div class="campo">
      <label>Tonalidad</label>
      <input id="tonalidad" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>

  <div class="zona">
    <div id="tablero"></div>

    <button onclick="crearFila()">+ crear fila debajo</button>

    <div class="bloque-json">
      <button onclick="guardarJSON()">Guardar JSON</button>
      <button onclick="document.getElementById('cargarArchivo').click()">Cargar JSON</button>
      <button onclick="imprimir()">Imprimir</button>
      <input id="cargarArchivo" type="file" accept=".json" style="display:none" onchange="cargarJSON(event)">
    </div>
  </div>

  <script>
    const anchoCuadro = 160;
    const separacion = 10;

    const cancion = {
      tema: "",
      autor: "",
      tonalidad: "",
      filas: [
        {
          acordes: [
            { compas: 1, tipo: "nombre", contenido: "" }
          ],
          letra: ""
        }
      ]
    };

    const tablero = document.getElementById("tablero");

    function renumerarCompases() {
      let numero = 1;
      cancion.filas.forEach(fila => {
        fila.acordes.forEach(cuadro => {
          if (!cuadro.compas || cuadro.compas < 1) cuadro.compas = numero;
          if (!cuadro.tipo) cuadro.tipo = "nombre";
          numero = Number(cuadro.compas) + 1;
        });
      });
    }

    function pintarTablero() {
      renumerarCompases();
      tablero.innerHTML = "";

      cancion.filas.forEach((fila, i) => {
        const filaDiv = document.createElement("div");
        filaDiv.className = "fila";

        const lineaAcordes = document.createElement("div");
        lineaAcordes.className = "linea-acordes";

        fila.acordes.forEach((cuadro, j) => {
          const cuadroDiv = document.createElement("div");
          cuadroDiv.className = "cuadro";

          const barra = document.createElement("div");
          barra.className = "barra-cuadro";

          const compas = document.createElement("input");
          compas.className = "compas";
          compas.type = "number";
          compas.min = "1";
          compas.value = cuadro.compas;
          compas.autocomplete = "off";
          compas.autocorrect = "off";
          compas.autocapitalize = "off";
          compas.spellcheck = false;
          compas.onchange = () => {
            cuadro.compas = Number(compas.value);
            renumerarCompases();
            pintarTablero();
          };

          const selector = document.createElement("div");
          selector.className = "selector-tipo";

          const bNombre = crearBotonTipo("✕", "nombre", cuadro);
          const bCavaco = crearBotonTipo("☰", "cavaco", cuadro);
          bCavaco.innerHTML = '<span class="cavaco-icono">☰</span>';
          const bPartitura = crearBotonTipo("𝄞", "partitura", cuadro);

          selector.appendChild(bNombre);
          selector.appendChild(bCavaco);
          selector.appendChild(bPartitura);

          const papelera = document.createElement("button");
          papelera.className = "papelera";
          papelera.textContent = "🗑";
          papelera.onclick = () => eliminarAcorde(i, j);

          barra.appendChild(compas);
          barra.appendChild(selector);
          barra.appendChild(papelera);

          const acorde = document.createElement("textarea");
          acorde.className = "acorde";
          acorde.autocomplete = "off";
          acorde.autocorrect = "off";
          acorde.autocapitalize = "off";
          acorde.spellcheck = false;
          acorde.value = cuadro.contenido;
          acorde.placeholder = "Acorde";
          acorde.oninput = () => cuadro.contenido = acorde.value;

          cuadroDiv.appendChild(barra);
          cuadroDiv.appendChild(acorde);
          lineaAcordes.appendChild(cuadroDiv);
        });

        const boton = document.createElement("button");
        boton.className = "boton-derecha";
        boton.textContent = "+";
        boton.onclick = () => crearCuadroDerecha(i);

        lineaAcordes.appendChild(boton);
        filaDiv.appendChild(lineaAcordes);

        const letra = document.createElement("textarea");
        letra.className = "letra";
        letra.autocomplete = "off";
        letra.autocorrect = "off";
        letra.autocapitalize = "off";
        letra.spellcheck = false;
        letra.value = fila.letra;
        letra.placeholder = "Letra de esta línea...";
        letra.style.setProperty(
          "--ancho-letra",
          ((fila.acordes.length * anchoCuadro) + ((fila.acordes.length - 1) * separacion)) + "px"
        );
        letra.oninput = () => fila.letra = letra.value;

        filaDiv.appendChild(letra);
        tablero.appendChild(filaDiv);
      });
    }

    function crearBotonTipo(texto, tipo, cuadro) {
      const boton = document.createElement("button");
      boton.className = "tipo";
      boton.textContent = texto;
      if (cuadro.tipo === tipo) boton.classList.add("activo");
      boton.onclick = () => {
        cuadro.tipo = tipo;
        pintarTablero();
      };
      return boton;
    }

    function eliminarAcorde(fila, columna) {
      if (cancion.filas[fila].acordes.length === 1) return;
      cancion.filas[fila].acordes.splice(columna, 1);
      renumerarCompases();
      pintarTablero();
    }

    function crearCuadroDerecha(i) {
      cancion.filas[i].acordes.push({ compas: 1, tipo: "nombre", contenido: "" });
      renumerarCompases();
      pintarTablero();
    }

    function crearFila() {
      cancion.filas.push({
        acordes: [{ compas: 1, tipo: "nombre", contenido: "" }],
        letra: ""
      });
      renumerarCompases();
      pintarTablero();
    }

    function actualizarCabeceraEnObjeto() {
      cancion.tema = document.getElementById("tema").value;
      cancion.autor = document.getElementById("autor").value;
      cancion.tonalidad = document.getElementById("tonalidad").value;
    }

    function cargarCabeceraDesdeObjeto() {
      document.getElementById("tema").value = cancion.tema || "";
      document.getElementById("autor").value = cancion.autor || "";
      document.getElementById("tonalidad").value = cancion.tonalidad || "";
    }

    function guardarJSON() {
      actualizarCabeceraEnObjeto();
      const datos = JSON.stringify(cancion, null, 2);
      const blob = new Blob([datos], { type: "application/json" });
      const enlace = document.createElement("a");

      const nombre = (cancion.tema || "cancion")
        .toLowerCase()
        .replaceAll(" ", "_")
        .replace(/[^\w\-]/g, "");

      enlace.href = URL.createObjectURL(blob);
      enlace.download = nombre + ".json";
      enlace.click();
      URL.revokeObjectURL(enlace.href);
    }

    function cargarJSON(event) {
      const archivo = event.target.files[0];
      if (!archivo) return;

      const lector = new FileReader();
      lector.onload = function(e) {
        const datos = JSON.parse(e.target.result);

        cancion.tema = datos.tema || "";
        cancion.autor = datos.autor || "";
        cancion.tonalidad = datos.tonalidad || "";
        cancion.filas = datos.filas || [
          {
            acordes: [{ compas: 1, tipo: "nombre", contenido: "" }],
            letra: ""
          }
        ];

        cancion.filas.forEach(fila => {
          fila.acordes.forEach(cuadro => {
            if (!cuadro.compas) cuadro.compas = 1;
            if (!cuadro.tipo) cuadro.tipo = "nombre";
          });
        });

        cargarCabeceraDesdeObjeto();
        renumerarCompases();
        pintarTablero();
      };

      lector.readAsText(archivo);
    }

    function imprimir() {
      actualizarCabeceraEnObjeto();
      window.print();
    }

    pintarTablero();
  </script>

</body>
</html>
