
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblioteca Cavaquinho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #05070a;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  padding: 16px;
  background: #10151c;
  border-bottom: 1px solid #2b3440;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

h1 {
  margin: 0;
  font-size: 24px;
}

button {
  background: #1c2633;
  color: white;
  border: 1px solid #3c4858;
  border-radius: 8px;
  padding: 9px 13px;
  font-size: 14px;
  cursor: pointer;
}

button:hover {
  background: #263445;
}

.zona {
  padding: 16px;
}

.lista-acordes {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 14px;
  min-height: 150px;
  padding: 8px;
  border: 1px dashed #30363d;
  border-radius: 10px;
}

.lista-acordes.destino {
  border-color: #2f81f7;
  background: #0f1623;
}

.mensaje-vacio {
  color: #8b949e;
  padding: 20px;
}

.acorde-card {
  width: 150px;
  background: #111821;
  border: 1px solid #394452;
  border-radius: 10px;
  padding: 8px;
  cursor: pointer;
  position: relative;
  user-select: none;
}

.acorde-card:hover {
  border-color: #2f81f7;
  background: #162235;
}

.acorde-card.arrastrando {
  opacity: 0.35;
}

.nombre-acorde {
  text-align: center;
  font-size: 18px;
  margin-bottom: 6px;
  min-height: 22px;
}

.diagrama {
  position: relative;
  width: 120px;
  height: 90px;
  margin: auto;
}

.cuerda {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: white;
}

.cuerda.c1 { top: 15px; }
.cuerda.c2 { top: 35px; }
.cuerda.c3 { top: 55px; }
.cuerda.c4 { top: 75px; }

.traste {
  position: absolute;
  top: 15px;
  bottom: 15px;
  width: 2px;
  background: white;
}

.traste.t0 { left: 0; }
.traste.t1 { left: 24px; }
.traste.t2 { left: 48px; }
.traste.t3 { left: 72px; }
.traste.t4 { left: 96px; }
.traste.t5 { left: 120px; }

.punto {
  position: absolute;
  width: 13px;
  height: 13px;
  background: black;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.traste-numero {
  text-align: center;
  font-size: 13px;
  color: #9fa8b5;
  margin-top: 4px;
  min-height: 16px;
}

.acciones-tarjeta {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 7px;
}

.acciones-tarjeta button {
  padding: 4px 7px;
  font-size: 11px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.78);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.panel {
  width: 92%;
  max-width: 650px;
  max-height: 90vh;
  overflow: auto;
  background: #10151c;
  border: 1px solid #394452;
  border-radius: 12px;
  padding: 18px;
}

.panel h2 {
  margin-top: 0;
}

.campos {
  display: grid;
  grid-template-columns: repeat(2, minmax(140px, 1fr));
  gap: 12px;
}

.campo {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.campo label {
  color: #9fa8b5;
  font-size: 13px;
}

.campo input,
.campo select {
  width: 100%;
  padding: 9px;
  background: #05070a;
  color: white;
  border: 1px solid #394452;
  border-radius: 6px;
  font-size: 16px;
}

.vista-previa {
  margin: 18px auto;
  width: 150px;
}

.botones-modal {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

@media (max-width: 600px) {
  header {
    align-items: flex-start;
    flex-direction: column;
  }

  .campos {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>🇧🇷 Biblioteca de Cavaquinho</h1>

  <button onclick="abrirEditorNuevo()">
    + Crear acorde
  </button>
</header>

<div class="zona">
  <div id="listaAcordes" class="lista-acordes"></div>
</div>

<div id="modalEditor" class="modal">
  <div class="panel">

    <h2 id="tituloEditor">Crear acorde</h2>

    <div class="campos">

      <div class="campo">
        <label>Nombre del acorde</label>
        <input
          id="nombreAcorde"
          type="text"
          placeholder="Ejemplo: C7"
          autocomplete="off"
        >
      </div>

      <div class="campo">
        <label>Número de abajo</label>
        <input
          id="numeroAbajo"
          type="text"
          placeholder="Ejemplo: 1"
          autocomplete="off"
        >
      </div>

      <div class="campo">
        <label>Cuerda 1</label>
        <select id="cuerda1">
          <option value="0">Sin círculo</option>
          <option value="1">Traste 1</option>
          <option value="2">Traste 2</option>
          <option value="3">Traste 3</option>
          <option value="4">Traste 4</option>
          <option value="5">Traste 5</option>
        </select>
      </div>

      <div class="campo">
        <label>Cuerda 2</label>
        <select id="cuerda2">
          <option value="0">Sin círculo</option>
          <option value="1">Traste 1</option>
          <option value="2">Traste 2</option>
          <option value="3">Traste 3</option>
          <option value="4">Traste 4</option>
          <option value="5">Traste 5</option>
        </select>
      </div>

      <div class="campo">
        <label>Cuerda 3</label>
        <select id="cuerda3">
          <option value="0">Sin círculo</option>
          <option value="1">Traste 1</option>
          <option value="2">Traste 2</option>
          <option value="3">Traste 3</option>
          <option value="4">Traste 4</option>
          <option value="5">Traste 5</option>
        </select>
      </div>

      <div class="campo">
        <label>Cuerda 4</label>
        <select id="cuerda4">
          <option value="0">Sin círculo</option>
          <option value="1">Traste 1</option>
          <option value="2">Traste 2</option>
          <option value="3">Traste 3</option>
          <option value="4">Traste 4</option>
          <option value="5">Traste 5</option>
        </select>
      </div>

    </div>

    <div id="vistaPrevia" class="vista-previa"></div>

    <div class="botones-modal">
      <button onclick="guardarAcorde()">Guardar</button>
      <button onclick="cerrarEditor()">Cancelar</button>
    </div>

  </div>
</div>

<script>
const CLAVE_BIBLIOTECA = "bibliotecaCavaquinho";
const CLAVE_SELECCION = "tarjetaSeleccionada";

let acordes = [];
let indiceEditando = null;
let indiceArrastrado = null;

const listaAcordes = document.getElementById("listaAcordes");

function cargarBiblioteca() {
  try {
    const guardados = localStorage.getItem(CLAVE_BIBLIOTECA);
    acordes = guardados ? JSON.parse(guardados) : [];

    if (!Array.isArray(acordes)) {
      acordes = [];
    }
  } catch (error) {
    console.error("No se pudo cargar la biblioteca:", error);
    acordes = [];
  }

  pintarBiblioteca();
}

function guardarBiblioteca() {
  localStorage.setItem(
    CLAVE_BIBLIOTECA,
    JSON.stringify(acordes)
  );
}

function crearDiagrama(datos) {
  const diagrama = document.createElement("div");
  diagrama.className = "diagrama";

  for (let cuerda = 1; cuerda <= 4; cuerda++) {
    const linea = document.createElement("div");
    linea.className = "cuerda c" + cuerda;
    diagrama.appendChild(linea);
  }

  for (let traste = 0; traste <= 5; traste++) {
    const linea = document.createElement("div");
    linea.className = "traste t" + traste;
    diagrama.appendChild(linea);
  }

  datos.cuerdas.forEach((traste, indice) => {
    if (Number(traste) === 0) return;

    const numeroCuerda = indice + 1;

    const punto = document.createElement("div");
    punto.className = "punto";

    punto.style.top =
      (15 + ((numeroCuerda - 1) * 20)) + "px";

    punto.style.left =
      ((Number(traste) - 0.5) * 24) + "px";

    diagrama.appendChild(punto);
  });

  return diagrama;
}

function crearTarjeta(datos, indice, incluirAcciones = true) {
  const tarjeta = document.createElement("div");
  tarjeta.className = "acorde-card";
  tarjeta.draggable = incluirAcciones;

  const nombre = document.createElement("div");
  nombre.className = "nombre-acorde";
  nombre.textContent = datos.nombre;

  const diagrama = crearDiagrama(datos);

  const numero = document.createElement("div");
  numero.className = "traste-numero";
  numero.textContent = datos.numeroAbajo || "";

  tarjeta.appendChild(nombre);
  tarjeta.appendChild(diagrama);
  tarjeta.appendChild(numero);

  if (incluirAcciones) {
    const acciones = document.createElement("div");
    acciones.className = "acciones-tarjeta";

    const editar = document.createElement("button");
    editar.textContent = "Editar";

    editar.onclick = event => {
      event.stopPropagation();
      abrirEditorEdicion(indice);
    };

    const borrar = document.createElement("button");
    borrar.textContent = "Borrar";

    borrar.onclick = event => {
      event.stopPropagation();
      borrarAcorde(indice);
    };

    acciones.appendChild(editar);
    acciones.appendChild(borrar);
    tarjeta.appendChild(acciones);

    tarjeta.onclick = () => {
      devolverAcordeAlEditor(datos);
    };

    tarjeta.addEventListener("dragstart", event => {
      indiceArrastrado = indice;
      tarjeta.classList.add("arrastrando");

      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", String(indice));
    });

    tarjeta.addEventListener("dragend", () => {
      tarjeta.classList.remove("arrastrando");
      indiceArrastrado = null;
      listaAcordes.classList.remove("destino");
    });

    tarjeta.addEventListener("dragover", event => {
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
    });

    tarjeta.addEventListener("drop", event => {
      event.preventDefault();
      event.stopPropagation();

      const origen = Number(
        event.dataTransfer.getData("text/plain")
      );

      moverAcorde(origen, indice);
    });
  }

  return tarjeta;
}

function pintarBiblioteca() {
  listaAcordes.innerHTML = "";

  if (acordes.length === 0) {
    const mensaje = document.createElement("div");
    mensaje.className = "mensaje-vacio";
    mensaje.textContent =
      "La biblioteca está vacía. Pulsa «Crear acorde».";
    listaAcordes.appendChild(mensaje);
    return;
  }

  acordes.forEach((acorde, indice) => {
    listaAcordes.appendChild(
      crearTarjeta(acorde, indice, true)
    );
  });
}

function abrirEditorNuevo() {
  indiceEditando = null;

  document.getElementById("tituloEditor").textContent =
    "Crear acorde";

  document.getElementById("nombreAcorde").value = "";
  document.getElementById("numeroAbajo").value = "";
  document.getElementById("cuerda1").value = "0";
  document.getElementById("cuerda2").value = "0";
  document.getElementById("cuerda3").value = "0";
  document.getElementById("cuerda4").value = "0";

  actualizarVistaPrevia();

  document.getElementById("modalEditor").style.display =
    "flex";

  document.getElementById("nombreAcorde").focus();
}

function abrirEditorEdicion(indice) {
  indiceEditando = indice;

  const acorde = acordes[indice];

  document.getElementById("tituloEditor").textContent =
    "Editar acorde";

  document.getElementById("nombreAcorde").value =
    acorde.nombre;

  document.getElementById("numeroAbajo").value =
    acorde.numeroAbajo || "";

  document.getElementById("cuerda1").value =
    String(acorde.cuerdas[0] || 0);

  document.getElementById("cuerda2").value =
    String(acorde.cuerdas[1] || 0);

  document.getElementById("cuerda3").value =
    String(acorde.cuerdas[2] || 0);

  document.getElementById("cuerda4").value =
    String(acorde.cuerdas[3] || 0);

  actualizarVistaPrevia();

  document.getElementById("modalEditor").style.display =
    "flex";
}

function cerrarEditor() {
  document.getElementById("modalEditor").style.display =
    "none";

  indiceEditando = null;
}

function obtenerDatosEditor() {
  return {
    nombre:
      document.getElementById("nombreAcorde").value.trim(),

    numeroAbajo:
      document.getElementById("numeroAbajo").value.trim(),

    cuerdas: [
      Number(document.getElementById("cuerda1").value),
      Number(document.getElementById("cuerda2").value),
      Number(document.getElementById("cuerda3").value),
      Number(document.getElementById("cuerda4").value)
    ]
  };
}

function guardarAcorde() {
  const datos = obtenerDatosEditor();

  if (datos.nombre === "") {
    alert("Escribe el nombre del acorde.");
    return;
  }

  if (indiceEditando === null) {
    acordes.push(datos);
  } else {
    acordes[indiceEditando] = datos;
  }

  guardarBiblioteca();
  cerrarEditor();
  pintarBiblioteca();
}

function borrarAcorde(indice) {
  const acorde = acordes[indice];

  const confirmar = confirm(
    "¿Borrar el acorde " + acorde.nombre + "?"
  );

  if (!confirmar) return;

  acordes.splice(indice, 1);

  guardarBiblioteca();
  pintarBiblioteca();
}

function moverAcorde(origen, destino) {
  if (
    Number.isNaN(origen) ||
    origen < 0 ||
    destino < 0 ||
    origen === destino
  ) {
    return;
  }

  const [movido] = acordes.splice(origen, 1);

  acordes.splice(destino, 0, movido);

  guardarBiblioteca();
  pintarBiblioteca();
}

function actualizarVistaPrevia() {
  const datos = obtenerDatosEditor();

  const previa = document.getElementById("vistaPrevia");
  previa.innerHTML = "";

  previa.appendChild(
    crearTarjeta(
      {
        nombre: datos.nombre || "Acorde",
        numeroAbajo: datos.numeroAbajo,
        cuerdas: datos.cuerdas
      },
      -1,
      false
    )
  );
}

function devolverAcordeAlEditor(datos) {
  const puntos = datos.cuerdas
    .map((traste, indice) => {
      if (Number(traste) === 0) return null;

      return (indice + 1) + "-" + Number(traste);
    })
    .filter(Boolean)
    .join(",");

  const tarjeta = document.createElement("div");
  tarjeta.className = "acorde-card";

  const nombre = document.createElement("div");
  nombre.className = "nombre-acorde";
  nombre.textContent = datos.nombre;

  const diagrama = document.createElement("div");
  diagrama.className = "diagrama";
  diagrama.dataset.puntos = puntos;

  const numero = document.createElement("div");
  numero.className = "traste-numero";
  numero.textContent = datos.numeroAbajo || "";

  tarjeta.appendChild(nombre);
  tarjeta.appendChild(diagrama);
  tarjeta.appendChild(numero);

  const html = tarjeta.outerHTML;

  localStorage.setItem("tarjetaSeleccionada", html);

  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(
      {
        tipo: "acordeCavaquinho",
        html: html
      },
      "*"
    );
  }

  setTimeout(() => {
    window.close();
  }, 300);
}
[
  "nombreAcorde",
  "numeroAbajo",
  "cuerda1",
  "cuerda2",
  "cuerda3",
  "cuerda4"
].forEach(id => {
  document.getElementById(id).addEventListener(
    "input",
    actualizarVistaPrevia
  );

  document.getElementById(id).addEventListener(
    "change",
    actualizarVistaPrevia
  );
});

listaAcordes.addEventListener("dragover", event => {
  event.preventDefault();
  listaAcordes.classList.add("destino");
});

listaAcordes.addEventListener("dragleave", event => {
  if (!listaAcordes.contains(event.relatedTarget)) {
    listaAcordes.classList.remove("destino");
  }
});

listaAcordes.addEventListener("drop", event => {
  event.preventDefault();
  listaAcordes.classList.remove("destino");

  if (indiceArrastrado === null) return;

  const [movido] = acordes.splice(indiceArrastrado, 1);
  acordes.push(movido);

  guardarBiblioteca();
  pintarBiblioteca();
});

document.getElementById("modalEditor").addEventListener(
  "click",
  event => {
    if (event.target.id === "modalEditor") {
      cerrarEditor();
    }
  }
);

cargarBiblioteca();
  window.addEventListener("message", function(event) {

  if (!event.data) return;

  if (event.data.tipo !== "acordeCavaquinho") return;

  if (!cuadroActivo) return;

  cuadroActivo.tipo = "instrumento";
  cuadroActivo.htmlTarjeta = event.data.html;
  cuadroActivo.contenido = "";

  pintarTablero();
  dibujarDiagramasPegados();

});
</script>

</body>
</html>
